"memories_read": 0, "memories_written": 1}, {"id": "23b032da-c75c-4582-bd68-57825414e83f", "author_username": "GitHub Copilot", "project": "olinkb", "started_at": "2026-04-12T02:22:44.957277+00:00", "ended_at": "2026-04-12T02:22:55.539932+00:00", "summary": "Simplified the static viewer again for comprehension: plain-language labels, guided detail panel, collapsed technical sections, regenerated HTML, and verified tests.", "memories_read": 0, "memories_written": 1}, {"id": "2cd32df7-a51c-4737-a74b-48d715137c58", "author_username": "GitHub Copilot", "project": "olinkb", "started_at": "2026-04-12T02:10:12.761778+00:00", "ended_at": "2026-04-12T02:10:42.151797+00:00", "summary": "Implemented the viewer brain-first redesign: dominant graph, persistent tabbed detail panel, compact library, regenerated static HTML, and verified with the full test suite.", "memories_read": 0, "memories_written": 1}, {"id": "26ef01a2-0911-4095-a198-e1a8c0d82f4c", "author_username": "rzjulio", "project": "olinkb", "started_at": "2026-04-12T01:45:27.517413+00:00", "ended_at": "2026-04-12T01:55:08.144787+00:00", "summary": "Goal: Build a read-only visual site inside the repo to inspect everything stored in PostgreSQL, including an Obsidian-like brain graph, while keeping the implementation extremely simple and portable. Instructions: User wanted it under olinkb-viewer, usable locally or on any server, visually polished, easy to digest, and strictly read-only. Discoveries: A static exported snapshot fits this better than a live HTTP facade because it is safer, portable, and hostable anywhere; the brain graph can be derived from explicit URI references, shared author, shared tags, and shared namespace. Accomplished: Added PostgreSQL snapshot export, a standalone HTML renderer with filters/list/detail/graph/activity, a new `olinkb viewer build` CLI command, scaffold docs under olinkb-viewer, and tests for viewer payload/rendering plus CLI parsing. Next Steps: Generate a live snapshot from a configured PostgreSQL environment with `olinkb viewer build`; optionally refine graph density, add more edge types, or publish the generated HTML to static hosting. Relevant Files: src/olinkb/viewer.py - static viewer payload builder and HTML renderer; src/olinkb/storage/postgres.py - full snapshot export queries; src/olinkb/cli.py - new viewer command and scaffold support; olinkb-viewer/index.html - standalone viewer artifact; tests/test_viewer.py - viewer coverage; tests/test_cli.py - CLI coverage.", "memories_read": 0, "memories_written": 1}, {"id": "2f8331fc-5a12-4975-a055-e018c2bcfcf5", "author_username": "rzjulio", "project": "olinkb", "started_at": "2026-04-12T01:38:13.606490+00:00", "ended_at": "2026-04-12T01:40:11.577695+00:00", "summary": "Goal: Define a minimal read-only website approach for visualizing all OlinKB PostgreSQL data, including an Obsidian-like brain graph. Instructions: User wants the site to be extremely simple, ideally a single HTML with embedded JS, and requested proposal plus clarifying questions before implementation. Discoveries: Current OlinKB server is MCP over stdio with no HTTP layer; PostgreSQL schema centers on memories, sessions, team_members, and audit_log; a brain graph can be built from real relations (author, namespace, tags, timeline) plus lightweight derived links. Accomplished: Booted OlinKB session, checked prior memory, delegated a read-only repo exploration, and defined a recommended MVP architecture using a tiny read-only HTTP facade plus a single static HTML/JS page. Next Steps: Ask the user to choose exposure mode, preferred graph density, and whether to include sessions/audit in the first version; then implement the HTTP endpoints and single-page UI. Relevant Files: src/olinkb/storage/postgres.py - existing query layer; src/olinkb/storage/migrations/001_init.sql - schema; src/olinkb/app.py - current MCP app orchestration; docs/DEVELOPER-GUIDE.md - runtime setup.", "memories_read": 0, "memories_written": 0}, {"id": "6d1c28a5-485e-4a33-8e09-cfb95e10d3f0", "author_username": "rzjulio", "project": "olinkb", "started_at": "2026-04-12T01:22:02.637945+00:00", "ended_at": null, "summary": null, "memories_read": 0, "memories_written": 0}, {"id": "cb7fa65b-f409-48d3-990f-308a1841e9c4", "author_username": "rzjulio", "project": "olinkb", "started_at": "2026-04-12T01:20:28.014390+00:00", "ended_at": "2026-04-12T01:20:34.811857+00:00", "summary": "Se abrió una sesión de OlinKB para el proyecto olinkb y se guardó una nota personal solicitada por el usuario en la URI personal://rzjulio/notes/sultan-89733.", "memories_read": 0, "memories_written": 1}, {"id": "6946f80a-4475-4214-b6b9-6191f1459139", "author_username": "rzjulio", "project": "olinkb", "started_at": "2026-04-12T01:16:09.221834+00:00", "ended_at": "2026-04-12T01:17:42.753041+00:00", "summary": "Expliqué la arquitectura del repositorio OlinKB tras revisar memoria de proyecto, README, guía de desarrollo y módulos centrales. Sinteticé propósito, capas, flujo MCP->app->sesión/caché->PostgreSQL, y limitaciones actuales de v0.1.0.", "memories_read": 0, "memories_written": 0}, {"id": "1f56d3be-6196-4683-8fd6-0001150b7b1b", "author_username": "rzjulio", "project": "olinkb", "started_at": "2026-04-12T01:13:25.082871+00:00", "ended_at": "2026-04-12T01:15:03.724091+00:00", "summary": "Explained OlinKB architecture by mapping the CLI/MCP entrypoints, application orchestration layer, in-memory session/cache components, PostgreSQL storage layer, bootstrap/configuration flow, and test layout for the user.", "memories_read": 0, "memories_written": 0}, {"id": "7741fc10-a46a-41f5-8352-839243696a24", "author_username": "GitHub Copilot", "project": "olinkb", "started_at": "2026-04-12T01:12:24.655084+00:00", "ended_at": "2026-04-12T01:12:27.843496+00:00", "summary": "Explained OlinKB architecture at a deeper level, focusing on layer boundaries, runtime flow from CLI to MCP tools, the split between in-memory session state and PostgreSQL persistence, and the main design tradeoffs of the MVP.", "memories_read": 0, "memories_written": 0}, {"id": "d4b55789-696e-4ed1-a075-b1a7a3d6e90c", "author_username": "GitHub Copilot", "project": "olinkb", "started_at": "2026-04-12T01:08:47.360397+00:00", "ended_at": "2026-04-12T01:10:27.636370+00:00", "summary": "Reviewed repository documentation and core entrypoints to summarize what OlinKB is, how it is structured, and how it is used. Saved a project memory capturing the system purpose, main MCP tools, PostgreSQL-backed persistence model, and the non-daemon stdio execution model.", "memories_read": 0, "memories_written": 1}], "auditLog": [{"id": 70, "timestamp": "2026-04-12T06:48:41.616664+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "f4e90728-9477-4d3c-aa7c-63ae0e1900f0", "uri": "project://olinkb/bugfix/viewer-search-highlight-auto-open-and-expand", "metadata": "{\"tags\": [\"viewer\", \"search\", \"highlight\", \"tree\", \"explorer\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The previous search only filtered the list and left too much manual work: users still had to visually hunt for the match, expand folders themselves, and sometimes manually change the selected note. The user explicitly wanted search to behave like a document browser: visible match highlighting, automatic opening of the first result, and automatic tree expansion to reveal all matches.\", \"what\": \"Updated the viewer search UX so typing in the search box now highlights matching substrings in note titles inside the explorer tree and highlights matching text inside the opened note content. Search input also clears the current selection so the first matching result becomes the active note automatically, and folder nodes auto-expand during active search so all visible matches are revealed without manual tree interaction.\", \"where\": \"src/olinkb/viewer.py and regenerated olinkb-viewer/index.html.\", \"learned\": \"In this viewer, the highest-leverage search improvements are entirely in the generated client-side HTML contract. A single normalized search helper can drive filtering, highlight rendering, and search-state-dependent tree openness without changing the backend or payload shape.\", \"decision\": \"Keep search case-insensitive via normalized matching, preserve the raw typed query for display/highlighting, force folder open state while a search is active, and route all title/content rendering through a shared highlightSearchText() helper.\\nEvidence: Editor diagnostics for src/olinkb/viewer.py reported no errors. Static rebuild succeeded with OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb OLINKB_TEAM=rz-develop OLINKB_USER=$USER OLINKB_PROJECT=olinkb /Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build. Generated olinkb-viewer/index.html contains .search-highlight CSS, highlightSearchText(node.title), highlightSearchText(selected.title), highlightSearchText(value), state.selectedId = null in the search handler, and search-time folder open logic using getNormalizedSearchQuery().\"}}"}, {"id": 69, "timestamp": "2026-04-12T06:42:19.525359+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "4e90d433-a851-4968-9ae7-041f28188b80", "uri": "project://olinkb/bugfix/viewer-explorer-team-project-type-hierarchy", "metadata": "{\"tags\": [\"viewer\", \"explorer\", \"tree\", \"team\", \"project\", \"type\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The user selected Team > Project > Type as the preferred navigation structure for the viewer after comparing hierarchy options.\", \"what\": \"Updated the notes explorer so project-scope memories now render in the hierarchy Team > Project > Type. The tree still falls back gracefully to Team > Type or Project > Type when one of those fields is missing.\", \"where\": \"src/olinkb/viewer.py and regenerated olinkb-viewer/index.html.\", \"learned\": \"For this viewer, hierarchy changes are isolated to getNoteFolderPath(), so the lowest-risk way to change the tree is to adjust only that function and rebuild the static artifact.\\nEvidence: Static rebuild succeeded with OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb OLINKB_TEAM=rz-develop OLINKB_USER=$USER OLINKB_PROJECT=olinkb /Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build. Generated HTML now contains `if (team && project) return [team, project, type];` in getNoteFolderPath().\"}}"}, {"id": 68, "timestamp": "2026-04-12T06:39:28.197012+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "1fb71a62-4d36-49ed-be73-6144418856a6", "uri": "project://olinkb/bugfix/viewer-explorer-remove-project-scope-root", "metadata": "{\"tags\": [\"viewer\", \"explorer\", \"tree\", \"project\", \"scope\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The previous change removed the internal project branch but still left the root folder named \\\"Project\\\" because getNoteFolderPath() always prefixed paths with humanizeScope(memory.scope). The browser DOM confirmed the tree was still rendering /Project/<team>/<type>.\", \"what\": \"Updated the viewer explorer path logic so project-scope notes no longer render under a top-level \\\"Project\\\" folder. For project memories the tree now starts directly at team when available, or at type when no team is resolved.\", \"where\": \"src/olinkb/viewer.py and regenerated olinkb-viewer/index.html.\", \"learned\": \"In this explorer, there are two distinct hierarchy sources: scope prefixes and semantic branches. Removing only the project branch is insufficient if scope remains the first path segment for project memories.\\nEvidence: The generated HTML now contains `if (memory.scope === \\\"project\\\") return team ? [team, type] : [type];` in getNoteFolderPath(), replacing the previous implicit /Project root path for project notes.\"}}"}, {"id": 67, "timestamp": "2026-04-12T06:32:12.936132+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "3288d310-3c9e-46b5-80d7-249f62483668", "uri": "project://olinkb/bugfix/viewer-explorer-expand-collapse-state-and-no-project-branch", "metadata": "{\"tags\": [\"viewer\", \"explorer\", \"tree\", \"expand\", \"collapse\", \"team\", \"project\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The previous hierarchy still exposed an unnecessary Project level in the notes structure, and the previous toggle behavior had become more complex than the user wanted. The requested UX is a direct tree-wide action whose label and arrow reflect the current explorer state.\", \"what\": \"Simplified the viewer notes explorer by removing the Project branch from the tree and making the control state-driven: when every folder is expanded it shows \\\"Collapse\\\" with the upward icon, otherwise it shows \\\"Expand\\\" with the downward icon. The button now performs expand-all or collapse-all based on the actual current tree state instead of restoring a saved snapshot.\", \"where\": \"src/olinkb/viewer.py and regenerated olinkb-viewer/index.html.\", \"learned\": \"For this explorer, the cleanest behavior is derived from the full set of folder keys in the rendered tree. If all keys are present in expandedFolders, the control should be a collapse action; otherwise it should be an expand action. Project is not needed in the notes tree once team/type grouping is sufficient.\\nEvidence: Rebuilt successfully with OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb OLINKB_TEAM=rz-develop OLINKB_USER=$USER OLINKB_PROJECT=olinkb /Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build. Generated HTML contains collectExplorerFolderKeys(tree), actionLabel = allExpanded ? \\\"Collapse\\\" : \\\"Expand\\\", data-direction for the icon, and getNoteFolderPath returning [scope, team, type] without the project branch.\"}}"}, {"id": 66, "timestamp": "2026-04-12T06:28:57.867945+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "492402d5-8c68-4ab5-b860-ca7360edb634", "uri": "project://olinkb/bugfix/viewer-explorer-team-parent-and-toggle-copy", "metadata": "{\"tags\": [\"viewer\", \"explorer\", \"team\", \"project\", \"hierarchy\", \"ui\", \"tree\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The previous tree skipped Team above Project, which made the file structure flatten project notes even when team membership had already been resolved in the payload. The user also wanted the explorer control phrased as a simple English expand/collapse label instead of action-specific wording.\", \"what\": \"Updated the viewer explorer so project notes now render under Team when team data is available, producing a stable hierarchy of Scope > Team > Project > Type. Also simplified the in-tree toggle button copy to the fixed English label \\\"Expand/Collapse\\\" and regenerated the static viewer artifact.\", \"where\": \"src/olinkb/viewer.py and olinkb-viewer/index.html.\", \"learned\": \"In this viewer, the right place to shape hierarchy is getNoteFolderPath(), and it should prefer resolved memory.team/memory.project fields over namespace parsing alone because project memories can derive team from team_members fallback data.\\nEvidence: Rebuilt successfully with OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb OLINKB_TEAM=rz-develop OLINKB_USER=$USER OLINKB_PROJECT=olinkb /Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build. Generated HTML now contains const collapseLabel = \\\"Expand/Collapse\\\" and if (project && team) return [scope, team, project, type].\"}}"}, {"id": 65, "timestamp": "2026-04-12T06:23:49.101413+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "e163054e-78f3-4b6d-9ed4-98e2b97a1f31", "uri": "project://olinkb/viewer/live-viewer-primary-default", "metadata": "{\"tags\": [\"viewer\", \"live-viewer\", \"cli\", \"docs\", \"scalability\"], \"scope\": \"project\", \"memory_type\": \"decision\", \"memory_metadata\": {\"why\": \"The original browser-side/static snapshot approach cannot remain ultra fast for millions of notes because browser memory and client-side filtering become the bottleneck. The scalable path is server-side title+content search with pagination against PostgreSQL, so the CLI and docs needed to steer users toward that path by default.\", \"what\": \"Changed the viewer UX so the live PostgreSQL-backed viewer is now the primary path for large-scale exploration, while the static HTML build remains a snapshot/export path. The CLI now defaults olinkb viewer to the live server behavior, keeps olinkb viewer serve explicit, and reframes olinkb viewer build as portable export only.\", \"where\": \"src/olinkb/cli.py, src/olinkb/viewer_server.py, README.md, olinkb-viewer/README.md, tests/test_cli.py.\", \"learned\": \"For very large datasets, the product decision matters as much as the query optimization. Keeping a static export as the prominent path creates the wrong scalability expectation even if the live search backend is already correct.\", \"decision\": \"Make olinkb viewer launch the live viewer by default and describe olinkb viewer build as a point-in-time snapshot/export.\\nEvidence: Focused verification passed with .venv/bin/python -m pytest tests/test_cli.py -> 15 passed. The live viewer path had already been validated earlier with focused storage/viewer tests for server-side title+content search and pagination.\"}}"}, {"id": 64, "timestamp": "2026-04-12T06:19:45.916116+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "7c999103-a4cd-4e05-9815-58d094dd2aaf", "uri": "project://olinkb/viewer/english-ui-copy", "metadata": "{\"tags\": [\"viewer\", \"ui\", \"translation\", \"static-html\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The viewer needed a fully English interface, including the subtitle under OlinKB Vault, and the repo also ships a static index.html artifact that must stay aligned with the source template.\", \"what\": \"Translated the OlinKB viewer UI from Spanish to English in the source template and regenerated the checked-in static viewer HTML.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html\", \"learned\": \"The viewer HTML is generated from render_viewer_html() in src/olinkb/viewer.py, and olinkb-viewer/index.html can be regenerated directly from that template without requiring a live database snapshot for this kind of copy change.\"}}"}, {"id": 63, "timestamp": "2026-04-12T06:19:23.280956+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "7031e4ae-465c-487c-b3fa-cb408c8bd97c", "uri": "project://olinkb/decisions/live-viewer-primary-cli-path-2026-04-12", "metadata": "{\"tags\": [\"viewer\", \"cli\", \"live-viewer\", \"static-export\", \"ux\", \"documentation\"], \"scope\": \"project\", \"memory_type\": \"decision\", \"memory_metadata\": {\"why\": \"The user wanted large-scale exploration to flow through the live viewer because the scalable search path already exists there via `/api/viewer`, while the static HTML export is not the right primary workflow for massive datasets.\", \"what\": \"Updated the viewer CLI so `olinkb viewer` now defaults to the live HTTP viewer path instead of requiring an explicit `serve` subcommand in practice. Also changed CLI help text, startup/output messaging, and focused documentation so the live PostgreSQL-backed viewer is presented as the primary exploration workflow, while `olinkb viewer build` is described as a static snapshot/export path.\", \"where\": \"src/olinkb/cli.py, src/olinkb/viewer_server.py, README.md, olinkb-viewer/README.md, tests/test_cli.py.\", \"learned\": \"For this repo, the highest-leverage UX shift is command/default framing rather than changing the viewer architecture. Making `viewer` resolve to live mode and making `viewer build` explicitly say snapshot/export is enough to steer users toward the scalable path without breaking existing build functionality.\", \"decision\": \"Keep `viewer serve` available, but make bare `viewer` behave like `viewer serve` with the same default host, port, and title. Keep `viewer build` unchanged functionally, but print guidance that it is a static snapshot and point users back to `olinkb viewer` for large-scale exploration.\\nEvidence: Focused verification passed with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_cli.py` showing 15 passed. Help output now shows `build` as `Export a static HTML snapshot for sharing or archival`, and the CLI path `olinkb viewer` dispatches through the live viewer defaults in tests.\", \"next_steps\": \"If the repo later wants the help output itself to advertise the implicit default more explicitly, add a short epilog or examples block to the argparse viewer parser.\"}}"}, {"id": 62, "timestamp": "2026-04-12T06:13:00.014059+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "035fcac4-3a14-4140-be12-150ac36debc1", "uri": "project://olinkb/bugfix/viewer-server-side-title-content-search", "metadata": "{\"tags\": [\"viewer\", \"search\", \"postgres\", \"pg_trgm\", \"pagination\", \"live-viewer\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The user required title and content filtering that stays ultra fast even with millions of notes. The previous client-side approach could not scale because it required loading and scanning the full note set in the browser.\", \"what\": \"Reworked the live viewer search path so the search box no longer filters a full in-browser snapshot. The live viewer now queries PostgreSQL through /api/viewer with q, limit, and opaque cursor params, and the database query matches both title and content while returning bounded pages. The UI renders only the current page and uses Previous/Next pagination instead of loading all notes for client-side filtering.\", \"where\": \"src/olinkb/storage/postgres.py, src/olinkb/viewer_server.py, src/olinkb/viewer.py, tests/test_postgres.py, tests/test_viewer.py.\", \"learned\": \"For the OlinKB viewer, scalability depends on keeping search server-side and bounded. Existing pg_trgm indexes on title and content are already enough to support fast filtered retrieval, so the highest-leverage change was moving filtering/pagination to the live API instead of inventing a new browser-side indexing layer.\", \"decision\": \"Use cursor pagination rather than offset pagination for the live viewer API, restrict matching to title and content, and keep the static built viewer as a snapshot artifact while reserving the scalable search path for the live HTTP viewer.\\nEvidence: Focused verification passed with /Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_postgres.py tests/test_viewer.py showing 17 passed, and editor diagnostics reported no errors in the touched backend/frontend files.\", \"next_steps\": \"If static exports also need million-note search, they will need a different artifact strategy because a single embedded HTML snapshot is inherently bounded by browser memory regardless of query logic.\"}}"}, {"id": 61, "timestamp": "2026-04-12T06:09:16.202125+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "e2e04c07-29b7-4f9f-a73d-dbc7cebfc53e", "uri": "project://olinkb/bugfix/live-viewer-server-side-search-pagination-2026-04-12", "metadata": "{\"tags\": [\"viewer\", \"search\", \"pagination\", \"postgres\", \"pg_trgm\", \"performance\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The previous live viewer path always loaded every note through `/api/viewer` and then filtered in JavaScript. That is acceptable for small snapshots but it does not scale to very large datasets and defeats the point of the existing PostgreSQL trigram indexes. The user explicitly needed search to stay fast at million-note scale and to avoid loading all notes into the browser just to search.\", \"what\": \"Reworked the live viewer so its search box no longer filters an already-loaded full memory snapshot in the browser. The live HTTP endpoint now serves bounded note pages from PostgreSQL, matched against both title and content, and the browser sends `q`, `limit`, and opaque `cursor` parameters for pagination. The renderer keeps the existing sidebar/note/graph layout, but in live mode it now renders only the current page of notes and shows previous/next controls instead of doing client-side search over all notes.\", \"where\": \"src/olinkb/storage/postgres.py, src/olinkb/viewer_server.py, src/olinkb/viewer.py, tests/test_postgres.py, tests/test_viewer.py.\", \"learned\": \"The repo already had the right building blocks in place for this feature: `pg_trgm` plus separate GIN trigram indexes on `memories.title` and `memories.content`. The high-leverage fix was not a schema change but a query/transport change: use those operators on the server and page with cursors, then scope the live graph to the returned page.\", \"decision\": \"Keep the static snapshot viewer unchanged for compatibility, and make the scalable behavior live under `viewer serve`. Use cursor pagination instead of offset pagination so deeper result pages do not degrade just because the dataset is large.\\nEvidence: Added regression tests for `search_viewer_memories` and the live HTML contract, then ran `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_postgres.py tests/test_viewer.py` and the full `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest`, both passing with the repository at 50 tests green.\", \"next_steps\": \"If the viewer later needs globally accurate graph relationships or total result counts at very large scale, add dedicated aggregate endpoints instead of falling back to loading broader note sets into the browser.\"}}"}, {"id": 60, "timestamp": "2026-04-12T06:08:53.757993+00:00", "actor_username": "GitHub Copilot", "action": "update", "memory_id": "c3c3fa62-42d3-4039-9b90-6f36510684e6", "uri": "project://olinkb/bugfix/viewer-collapse-all-explorer-folders", "metadata": "{\"tags\": [\"viewer\", \"explorer\", \"tree\", \"collapse\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The user wanted a quick way to collapse all notes/folders in the file structure section instead of manually closing branches one by one.\", \"what\": \"Added a `Colapsar todo` control to the viewer file-structure explorer and wired it to the existing folder expansion state so the whole tree can be collapsed in one action without changing note selection.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html.\", \"learned\": \"The safest implementation is to clear `expandedFolders` and gate `<details open>` through a dedicated `collapseExplorer` flag, then automatically release that forced-collapsed mode on user search or manual folder toggles so normal explorer behavior continues naturally.\\nEvidence: Focused verification passed with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_viewer.py::test_render_viewer_html_supports_collapsing_all_explorer_folders -q` and the static rebuild succeeded with `OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb OLINKB_TEAM=rz-develop OLINKB_USER=$USER OLINKB_PROJECT=olinkb /Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build`. The generated `olinkb-viewer/index.html` contains `id=\\\"collapse-explorer\\\"`, the click handler, and the `collapseExplorer` open-state guard.\"}}"}, {"id": 59, "timestamp": "2026-04-12T06:05:26.983022+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "c3c3fa62-42d3-4039-9b90-6f36510684e6", "uri": "project://olinkb/bugfix/viewer-collapse-all-explorer-folders", "metadata": "{\"tags\": [\"viewer\", \"explorer\", \"tree\", \"collapse\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The file structure explorer already preserved open folders, but it had no global way to collapse the tree. The requested change was specifically limited to that section, so the smallest reliable implementation was to reuse the existing folder-open state instead of introducing a second tree model.\", \"what\": \"Added a small `Colapsar todo` control to the viewer file-structure section and wired it to the existing `expandedFolders` client-side state so users can collapse the entire sidebar tree in one action. The renderer now keeps a dedicated `collapseExplorer` flag, clears stored open folders on click, and lets normal manual folder toggling restore regular expansion behavior afterward. Regenerated the checked-in static viewer artifact so the same control exists in `olinkb-viewer/index.html`.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html.\", \"learned\": \"For this viewer, a global collapse action works cleanly as a temporary render gate on top of `expandedFolders`; clearing the open-folder set alone is not enough because selected-path auto-expansion would immediately reopen the tree on rerender.\", \"decision\": \"Keep the change local to the renderer contract: one new button in the section header, one new state flag, and a focused regression test for the generated HTML/JS instead of broader behavior changes.\\nEvidence: Focused verification passed with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_viewer.py -k \\\"embeds_serialized_payload or supports_persistent_theme_switching_in_static_and_live_modes or supports_collapsing_all_explorer_folders\\\" -q` showing `3 passed`. Static rebuild succeeded with `OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb ... /Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build`, and the rebuilt HTML contains `collapse-explorer` plus the new JS state lines.\", \"next_steps\": \"If the explorer later needs symmetric behavior, add an `Expandir todo` action or search-aware auto-expansion as a separate change rather than folding it into this minimal control.\"}}"}, {"id": 58, "timestamp": "2026-04-12T05:54:29.387872+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "2092df5d-573b-4ac7-bc1d-3f99dbc570ca", "uri": "project://olinkb/procedures/static-viewer-needs-http-server-2026-04-12", "metadata": "{\"tags\": [\"viewer\", \"static\", \"http\", \"serving\", \"debugging\"], \"scope\": \"project\", \"memory_type\": \"procedure\", \"memory_metadata\": {\"why\": \"After a successful `olinkb viewer build`, the user reported that the viewer still did not load.\", \"what\": \"Confirmed that the generated static viewer artifact in olinkb-viewer/index.html had valid inline JavaScript and that the immediate reason it was not loading was simply that nothing was serving it on port 8123. Started a static HTTP server from olinkb-viewer and verified HTTP 200 from http://127.0.0.1:8123/.\", \"where\": \"olinkb-viewer/index.html and local static server on port 8123.\", \"learned\": \"A successful static build does not imply an active local server. When the viewer appears to \\\"not load\\\", first distinguish between a broken generated artifact and a missing HTTP server; JavaScript syntax validation plus curl against 8123 isolates that quickly.\\nEvidence: Inline script validation passed for all 3 script blocks with Node `--check`, and curl to 127.0.0.1:8123 returned HTTP/1.0 200 OK after starting `python3 -m http.server 8123` inside olinkb-viewer.\", \"next_steps\": \"If a DB-backed live view is needed instead of the built static snapshot, use `olinkb cli viewer serve` with the PostgreSQL environment variables instead of the plain static file server.\"}}"}, {"id": 57, "timestamp": "2026-04-12T05:50:57.216796+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "d4f0e87e-3d17-4ee9-bbf7-e1a30b918f6d", "uri": "project://olinkb/bugfix/viewer-team-field-for-project-memories", "metadata": "{\"tags\": [\"viewer\", \"team\", \"payload\", \"metadata\", \"project-memory\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The viewer was already trying to display `Equipo`, but it only derived it from `namespace`. For `project://...` memories that always rendered `-` even when the author belonged to a team, which made it look like team was not persisted.\", \"what\": \"Fixed the viewer so project-scope memories now carry resolved `team` and `project` fields in the payload, falling back to the author's team from `team_members` when the namespace does not encode a team directly. Updated the metadata panel to use those resolved fields, extended search to include them, and regenerated the static viewer artifact.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html.\", \"learned\": \"In OlinKB, team is not stored as a direct column on memories; for project memories it must be resolved from the author/team_members relationship unless the namespace itself is team-scoped.\\nEvidence: Focused verification passed with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_viewer.py` showing 9 passed, and the static viewer rebuilt successfully with the configured PostgreSQL environment.\", \"next_steps\": \"If desired, the next improvement is to expose team as an explicit filter control in the UI instead of only including it in payload data and note metadata.\"}}"}, {"id": 56, "timestamp": "2026-04-12T05:46:58.720195+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "ea466dad-c17b-4bdb-b706-18b480abd834", "uri": "project://olinkb/procedures/move-root-markdown-into-docs", "metadata": "{\"tags\": [\"docs\", \"repository-layout\", \"markdown\"], \"scope\": \"project\", \"memory_type\": \"procedure\", \"memory_metadata\": {\"why\": \"The user requested a cleaner root with all documentation centralized under docs except README files.\", \"what\": \"Moved every non-README Markdown file from the repository root into docs/ using git-preserving renames, leaving only README.md files in place.\", \"where\": \"docs/CHANGELOG.md, docs/analisis-olinkb.md, docs/knowledge-base-ai-memory-systems.md, docs/olinkb-arquitectura-c4.md, docs/olinkb-mcp-operacion.md, plus link updates in README.md, docs/DEVELOPER-GUIDE.md, and docs/releases/RELEASING.md.\", \"learned\": \"This repo already had release and developer documentation under docs, so moving the remaining top-level Markdown files there only required a small link pass for changelog references; generated artifacts and unrelated worktree changes should be left untouched.\"}}"}, {"id": 55, "timestamp": "2026-04-12T05:40:44.347981+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "78c9fdac-431c-43aa-88c9-5e3e40a8fe6c", "uri": "project://olinkb/procedures/session-summary-promotion-smoke-test-2026-04-12", "metadata": "{\"tags\": [\"verification\", \"smoke-test\", \"end_session\", \"remember\", \"viewer\"], \"scope\": \"project\", \"memory_type\": \"procedure\", \"memory_metadata\": {\"why\": \"The user asked how to confirm the three changes are actually working in practice rather than only through unit tests.\", \"what\": \"Verified end-to-end that a rich `end_session` summary is promoted into a durable project memory, is retrievable through `remember`, and is also present in the live viewer payload.\", \"where\": \"Direct repository-backed app execution against PostgreSQL, live viewer endpoint at http://127.0.0.1:8123/api/viewer, and promoted URI `project://olinkb-smoke-test-2/sessions/09949c47-25f0-4ed9-82db-d1f0a170843e`.\", \"learned\": \"The definitive verification path is a smoke test with a unique marker inside a structured end-session summary. That confirms all three layers together: capture heuristics, durable promotion/retrieval, and viewer visibility.\\nEvidence: The direct smoke test returned `memories_written: 1` and `remember_count: 1` for marker `beta-2026-04-12`. The live `/api/viewer` payload also included the promoted memory under the same URI, plus the ended session row for project `olinkb-smoke-test-2` with `memories_written: 1`.\", \"next_steps\": \"If the viewer should make these easier to inspect manually, expose promoted session notes or session-summary-derived notes more explicitly in the UI.\"}}"}, {"id": 54, "timestamp": "2026-04-12T05:38:36.827180+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "06cd58e2-73bd-4384-8657-e6eee2ced08f", "uri": "project://olinkb-smoke-test-2/sessions/09949c47-25f0-4ed9-82db-d1f0a170843e", "metadata": "{\"tags\": [\"session-summary\", \"end_session\", \"sessions\"], \"scope\": \"project\", \"memory_type\": \"event\", \"memory_metadata\": {\"goal\": \"verify session summary retrieval smoke test beta-2026-04-12\", \"next_steps\": \"query remember for beta-2026-04-12 and confirm it also appears in retrieval\", \"discoveries\": \"smoke verification note for OlinKB session-aware retrieval\", \"accomplished\": \"created a rich end_session summary with a unique marker beta-2026-04-12 and expected durable promotion\", \"instructions\": \"confirm that end_session summaries can be recalled through remember and promoted to durable notes\"}}"}, {"id": 53, "timestamp": "2026-04-12T05:36:58.482277+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "a15de9d5-65a8-4af4-8750-2cd542e2186d", "uri": "project://olinkb/bugfix/viewer-light-palette-refinement", "metadata": "{\"tags\": [\"viewer\", \"theme\", \"light-mode\", \"palette\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The first light palette worked functionally but still felt too generic; the goal was to make the clear theme feel more intentional and closer to an Obsidian-like reading surface.\", \"what\": \"Adjusted the OlinKB viewer light theme variables to a softer paper-and-stone palette with calmer blue accents, keeping the existing dark/light toggle and shared renderer unchanged.\", \"where\": \"src/olinkb/viewer.py and regenerated olinkb-viewer/index.html. Verified with pytest tests/test_viewer.py tests/test_cli.py and by restarting the live viewer on 127.0.0.1:8123.\", \"learned\": \"Theme quality in this viewer is mostly determined by the CSS variable set for light mode; a small, targeted palette pass is enough to materially improve the feel without touching layout or JS behavior.\"}}"}, {"id": 52, "timestamp": "2026-04-12T05:35:07.703690+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "321aa73d-9cfb-4a0a-a5df-4d46da014c77", "uri": "project://olinkb/decisions/durable-notes-through-session-aware-retrieval", "metadata": "{\"tags\": [\"remember\", \"end_session\", \"retrieval\", \"session-summary\", \"notes\"], \"scope\": \"project\", \"memory_type\": \"decision\", \"memory_metadata\": {\"why\": \"The user wanted notes that remain genuinely useful on re-consultation. Before this change, important context could be trapped in `sessions.summary`, which was not part of normal retrieval, and agents could still defer durable capture until session end. That made useful knowledge harder to recover and reduced the practical value of the memory system.\", \"what\": \"Implemented three complementary changes so OlinKB captures and returns more useful notes instead of depending on terse closure summaries alone. `remember` now queries relevant ended session summaries in addition to regular memories, `end_session` now promotes sufficiently rich project summaries into deterministic project memories under `project://<project>/sessions/<session_id>`, and the generated instructions now explicitly say not to wait for `end_session` to persist important findings.\", \"where\": \"src/olinkb/app.py, src/olinkb/storage/postgres.py, src/olinkb/templates.py, .github/copilot-instructions.md, tests/test_app.py, tests/test_postgres.py, tests/test_templates.py.\", \"context\": \"Earlier work had already added metadata extraction and richer save guidance, but the user explicitly wanted all three follow-up steps so notes become truly useful rather than summary-like.\", \"learned\": \"A usable memory system needs both capture-time discipline and retrieval-time coverage. Improving prompts alone leaves historical context outside the query path, while querying sessions alone still loses value if important findings are never persisted as durable memories.\", \"decision\": \"Treat `end_session` as a secondary source of project knowledge. Search its summaries for recall, but only promote them to durable memories when they are clearly substantial, using heading markers or enough word count as the heuristic.\\nEvidence: Added app tests for merged `remember` results and summary promotion, storage tests for `search_session_summaries`, and template regression coverage. The full pytest suite passed with 48 tests.\", \"next_steps\": \"If desired, the next leverage point is UI: expose session-summary hits and promoted session notes more clearly in the viewer so users can distinguish derived session knowledge from manually saved memories.\"}}"}, {"id": 51, "timestamp": "2026-04-12T05:33:30.395590+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "7bc1c11e-421d-4275-8800-9cda7d929d26", "uri": "project://olinkb/bugfix/viewer-theme-toggle-light-mode", "metadata": "{\"tags\": [\"viewer\", \"theme\", \"light-mode\", \"localstorage\", \"ui\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The viewer only had a single dark palette and no user-controlled theme state, which made the interface feel less intentional and prevented users from choosing a readable light mode or keeping that choice across reloads.\", \"what\": \"Updated the OlinKB viewer renderer so both static and live HTML now share a user-switchable dark/light theme system with a persistent sidebar toggle, a cleaned-up palette based on CSS variables, and light-mode-aware canvas styling for the graph. Regenerated olinkb-viewer/index.html from PostgreSQL after the renderer change so the checked-in static artifact uses the same theme logic as the live viewer.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html. Verified live runtime with OLINKB_PG_URL=postgresql://olinkb:olinkb@localhost:5433/olinkb, OLINKB_TEAM=rz-develop, OLINKB_USER=$USER, OLINKB_PROJECT=olinkb.\", \"learned\": \"The cleanest way to keep static and live viewer theming aligned is to treat render_viewer_html() as the single source of truth and keep theme state entirely in the generated HTML contract via documentElement dataset plus localStorage. The graph canvas also needs theme-aware drawing colors from CSS variables; otherwise the shell can switch themes while the brain view still looks locked to dark mode.\", \"decision\": \"Keep dark as the default baseline, add a sidebar appearance toggle instead of OS-only detection, persist the selected theme under olinkb.viewer.theme in localStorage, and use a small head bootstrap script to apply the stored theme before the main UI renders.\\nEvidence: Added a focused viewer test asserting the theme-switching contract in both static and live HTML modes. Fresh verification passed with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m pytest tests/test_viewer.py tests/test_cli.py` showing 21 passed. Static rebuild succeeded with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer build`. Live viewer restart succeeded with `/Volumes/Datos/Repos/olinkb/.venv/bin/python -m olinkb.cli viewer serve --host 127.0.0.1 --port 8123`, and both `http://127.0.0.1:8123/` and `http://127.0.0.1:8123/api/viewer` returned HTTP 200.\", \"next_steps\": \"If the palette needs another pass later, adjust the CSS variable sets in render_viewer_html() rather than editing static artifacts directly so both delivery modes stay in sync.\"}}"}, {"id": 50, "timestamp": "2026-04-12T05:25:45.528340+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "7e64fe54-7e1d-4001-a5c0-15f58c28cafe", "uri": "project://olinkb/bugfix/init-refreshes-existing-olinkb-protocol", "metadata": "{\"tags\": [\"init\", \"bootstrap\", \"instructions\", \"cli\", \"copilot\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The previous bootstrap logic treated any existing OlinKB protocol block as immutable, so users could update the CLI and rerun `--init` in another project and still keep old repository instructions. That made it look like the CLI had not picked up recent changes even though the code and templates were already updated.\", \"what\": \"Fixed the workspace bootstrap so rerunning `olinkb --init` now replaces an existing `## OlinKB Memory Protocol` block with the latest generated template instead of leaving the stale block untouched. Added a regression test that seeds an older protocol block plus unrelated repo instructions and verifies the OlinKB block is updated in place without removing the unrelated section.\", \"where\": \"src/olinkb/bootstrap.py and tests/test_cli.py.\", \"learned\": \"This issue is a bootstrap merge bug, not a database or migration problem. If the CLI is already resolving to current source, the missing behavior comes from preserving stale instructions, not from an outdated schema.\", \"decision\": \"Replace the existing OlinKB protocol block by pattern match on rerun while preserving other repo instructions before and after it.\\nEvidence: The new CLI regression test passes, and the full repository test suite passes with 43 tests total.\", \"next_steps\": \"Rerun `olinkb --init` in the other project, then reload the VS Code window or start a new chat there so Copilot reloads the refreshed repository instructions.\"}}"}, {"id": 49, "timestamp": "2026-04-12T05:18:31.597969+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "e3e4f91c-0a89-4c87-8595-296325a9fef2", "uri": "project://olinkb/bugfix/viewer-note-sections-subtitle-style", "metadata": "{\"tags\": [\"viewer\", \"notes\", \"ux\", \"content\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The user wanted the note content to feel like readable subsections, not dashboard tiles.\", \"what\": \"Changed the OlinKB viewer note pane so What, Why, Where, and Learned render as subtitle-style sections within the reading flow instead of separate cards.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py.\", \"learned\": \"For note reading UIs, lightweight subtitles preserve scanability without fragmenting the content area the way card layouts do.\"}}"}, {"id": 48, "timestamp": "2026-04-12T05:14:21.135582+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "86fad24c-e56b-44ad-8367-f17c6304e42e", "uri": "project://olinkb/bugfix/viewer-structured-note-sections", "metadata": "{\"tags\": [\"viewer\", \"notes\", \"metadata\", \"ux\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"The user wanted note content to be easier to scan and understand quickly in the live viewer.\", \"what\": \"Updated the OlinKB viewer note pane to present What, Why, Where, and Learned as separate readable blocks instead of a single raw content blob.\", \"where\": \"src/olinkb/viewer.py, tests/test_viewer.py.\", \"learned\": \"The lowest-friction approach is to normalize structured sections once in Python from metadata plus raw content headings, then let the frontend render cards consistently for both static and live viewer modes.\"}}"}, {"id": 47, "timestamp": "2026-04-12T05:12:14.976681+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "54ad9c9b-8beb-4ac4-b0ea-b3a4cc17b0a7", "uri": "project://olinkb/procedures/current-mcp-picks-up-guidance", "metadata": "{\"tags\": [\"mcp\", \"instructions\", \"refresh\", \"copilot\", \"editable-install\"], \"scope\": \"project\", \"memory_type\": \"procedure\", \"memory_metadata\": {\"why\": \"The user asked what must be done for the current MCP to take the new richer-memory behavior, and the key uncertainty was whether the running MCP pointed to an outdated installed package or to the current source tree.\", \"what\": \"Verified that the MCP configured in the workspace already resolves `olinkb` to the local repository source, and that the active CLI renders the strengthened memory-writing template with operational-depth guidance. This means the server code does not need a reinstall to pick up the recent changes in this repo.\", \"where\": \".vscode/mcp.json, src/olinkb/templates.py, the shell-resolved `olinkb` executable, and the rendered output of `olinkb template instructions`.\", \"learned\": \"There are two separate refresh boundaries: MCP server code and Copilot instruction context. Even when the CLI already points to local source, the current chat may still be using instruction context loaded before the file changes.\\nEvidence: `command -v olinkb` resolved to `/Users/rzjulio/.pyenv/shims/olinkb`, which in turn loads `olinkb.templates` from `/Volumes/Datos/Repos/olinkb/src/olinkb/templates.py`. Running `olinkb template instructions` printed the new guidance including \\\"Do not save a one-line summary\\\" and the richer effective memory format.\", \"decision\": \"Explain that no reinstall is needed for this workspace, but a new chat or window reload is needed for Copilot to reload repository instructions, and a server restart may be needed only if a long-lived MCP process is still alive.\", \"next_steps\": \"If the user still sees old behavior in the current conversation, start a fresh chat after reloading the VS Code window so both instructions and MCP process state are refreshed together.\"}}"}, {"id": 46, "timestamp": "2026-04-12T05:08:52.109675+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "be30b604-6583-42a7-8ca4-983a143faec1", "uri": "project://medical-app/ui/aurora-mint-meds-paywall-pass", "metadata": "{\"tags\": [\"ui\", \"aurora-mint\", \"meds\", \"paywall\"], \"scope\": \"project\", \"memory_type\": \"decision\"}"}, {"id": 45, "timestamp": "2026-04-12T05:08:38.399450+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "cd0eba44-df57-4d27-8818-504b158f15c0", "uri": "project://medical-app/frontend/review/meds-paywall-stop-check-2026-04-12", "metadata": "{\"tags\": [\"frontend\", \"paywall\", \"meds\", \"review\", \"stop-check\"], \"scope\": \"project\", \"memory_type\": \"discovery\"}"}, {"id": 44, "timestamp": "2026-04-12T05:07:53.054028+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "3ec976c6-d9f6-4afd-b188-c0be6d861b92", "uri": "project://olinkb/decisions/memory-guidance-operational-depth", "metadata": "{\"tags\": [\"memory\", \"guidance\", \"prompting\", \"retrieval\", \"templates\"], \"scope\": \"project\", \"memory_type\": \"decision\", \"memory_metadata\": {\"why\": \"The storage and metadata pipeline were already working, but consulted notes still felt unhelpful because agents were being prompted to save compact summaries rather than durable context. Without stronger writing guidance, retrieval quality remains limited even with better schema support.\", \"what\": \"Updated the generated OlinKB instruction template and repository guidance so future memories are not saved as short summaries but as reusable operational notes with enough detail to continue work later. The new guidance explicitly asks for concrete actions, root cause, affected boundaries, transferable learnings, and supporting evidence instead of terse bullets.\", \"where\": \"src/olinkb/templates.py, .github/copilot-instructions.md, olinkb-mcp-operacion.md, tests/test_templates.py.\", \"context\": \"User feedback was that consulted memories still felt like pure resumen and did not help enough when returning later. This came after metadata persistence and legacy read fallback were already implemented and tested.\", \"learned\": \"In this system, note usefulness is constrained more by capture discipline than by retrieval mechanics once the basic metadata pipeline exists. If the prompt asks for a summary, the database will faithfully preserve a summary.\", \"decision\": \"Make the memory-writing contract explicitly reject one-line summaries and require operational depth, including optional Context, Decision, Evidence, and Next Steps sections when they improve future reuse.\\nEvidence: The updated template now states \\\"Do not save a one-line summary\\\" and \\\"Aim to save enough detail that a later agent can continue the work without reopening every touched file first\\\". The template regression test was updated accordingly and the full pytest suite passed.\", \"next_steps\": \"If future retrieval still feels weak, the next leverage point is ranking and display: boost matches on metadata fields and surface those sections more explicitly in the viewer and remember results.\"}}"}, {"id": 43, "timestamp": "2026-04-12T05:06:45.385623+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "7385e67e-62da-4e33-bbed-088f592e449a", "uri": "project://medical-app/reviews/paywall-cta-null-package-dead-tap-2026-04-12", "metadata": "{\"tags\": [\"medical-app\", \"paywall\", \"revenuecat\", \"review\"], \"scope\": \"project\", \"memory_type\": \"discovery\"}"}, {"id": 42, "timestamp": "2026-04-12T05:04:07.704470+00:00", "actor_username": "rzjulio", "action": "create", "memory_id": "199123e8-d08a-417c-a37d-bed39f5dc3ac", "uri": "project://medical-app/frontend/review/aurora-mint-meds-paywall-2026-04-12", "metadata": "{\"tags\": [\"frontend\", \"aurora-mint\", \"meds\", \"paywall\", \"review\"], \"scope\": \"project\", \"memory_type\": \"discovery\"}"}, {"id": 41, "timestamp": "2026-04-12T05:03:11.496495+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "0fc74e8d-3586-48ec-a864-869a66b561ef", "uri": "project://olinkb/decisions/richer-memory-context-metadata", "metadata": "{\"tags\": [\"memory\", \"metadata\", \"retrieval\", \"postgres\", \"viewer\"], \"scope\": \"project\", \"memory_type\": \"decision\", \"memory_metadata\": {\"why\": \"Saved notes were technically persistent but too thin to be useful on later consultation because the important context stayed trapped in a raw text blob.\", \"what\": \"OlinKB now persists structured memory metadata in a dedicated JSONB column and also derives that metadata on read for legacy notes that only have structured content blocks.\", \"where\": \"src/olinkb/storage/postgres.py, src/olinkb/storage/migrations/003_add_memory_metadata.sql, src/olinkb/app.py, src/olinkb/server.py, src/olinkb/templates.py, tests/test_postgres.py, tests/test_app.py, tests/test_server.py, tests/test_templates.py.\", \"learned\": \"Enriching only new writes is not enough for note utility; existing memories need a read-time compatibility path or backfill, otherwise retrieval quality improves only prospectively.\", \"decision\": \"Keep stored metadata authoritative when present, but extract What/Why/Where/Learned/Context/Decision/Next Steps from content whenever a legacy row has empty metadata.\", \"next_steps\": \"If desired, add retrieval ranking that boosts matches on extracted metadata fields and surface those fields more explicitly in the viewer UI.\"}}"}, {"id": 40, "timestamp": "2026-04-12T05:02:33.949897+00:00", "actor_username": "GitHub Copilot", "action": "update", "memory_id": "0b7569b5-6ea1-483a-ac9a-47537f4f7672", "uri": "project://olinkb/bugfix/legacy-read-time-metadata-fallback", "metadata": "{\"tags\": [\"metadata\", \"retrieval\", \"postgres\", \"legacy\", \"boot\", \"search\", \"export\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"Older memories with metadata={} still returned thin results on boot/search/export until they were rewritten, despite already containing structured content in the body.\", \"what\": \"Added a read-time fallback in PostgreSQL memory serialization so legacy rows with empty metadata derive structured fields from What/Why/Where/Learned/Context/Decision/Next Steps content, while non-empty stored metadata remains authoritative.\", \"where\": \"src/olinkb/storage/postgres.py and tests/test_postgres.py.\", \"learned\": \"In the current runtime, JSONB metadata can arrive from asyncpg as JSON strings like \\\"{}\\\" or \\\"{\\\\\\\"what\\\\\\\": \\\\\\\"...\\\\\\\"}\\\", so the serializer must decode stringified metadata before deciding whether to keep stored metadata or apply legacy fallback extraction.\"}}"}, {"id": 39, "timestamp": "2026-04-12T05:01:53.205711+00:00", "actor_username": "GitHub Copilot", "action": "create", "memory_id": "0b7569b5-6ea1-483a-ac9a-47537f4f7672", "uri": "project://olinkb/bugfix/legacy-read-time-metadata-fallback", "metadata": "{\"tags\": [\"metadata\", \"retrieval\", \"postgres\", \"legacy\", \"boot\", \"search\", \"export\"], \"scope\": \"project\", \"memory_type\": \"bugfix\", \"memory_metadata\": {\"why\": \"Older memories with metadata={} still returned thin results on boot/search/export until they were rewritten, despite already containing structured content in the body.\", \"what\": \"Added a read-time fallback in PostgreSQL memory serialization so legacy rows with empty metadata derive structured fields from What/Why/Where/Learned/Context/Decision/Next Steps content, while non-empty stored metadata remains authoritative.\", \"where\": \"src/olinkb/storage/postgres.py and tests/test_postgres.py.\", \"learned\": \"The narrowest safe fix is to enrich only the memory serialization path and route export snapshots through the same serializer, which covers boot, search, and viewer/export behavior without changing stored rows.\"}}"}, {"id": 38, "timestamp": "2026-04-12T04:59:32. , "project": "olinkb", "team": "rz-develop", "size": 15.0, "isDeleted": false, "sections": {"what": "Replaced the static viewer template with an Obsidian-like three-pane layout: left vault sidebar with searchable note list, central note reading pane, and right local graph/related-notes pane, then rebuilt olinkb-viewer/index.html.", "why": "The prior guided dashboard still felt unlike Obsidian and did not match the user's mental model for navigating stored memories.", "where": "src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html.", "learned": "Matching the product metaphor mattered more than incremental simplification; the user wanted an app-like vault interface rather than a polished dashboard.", "remaining": ""}}, {"id": "465f889d-9d4f-4e40-a889-d828e141a04c", "uri": "project://olinkb/decisions/viewer-sidebar-explorer-for-notes", "title": "Converted sidebar into canonical notes explorer", "content": "What: Removed the sidebar filter tree from the static viewer and replaced it with a canonical folder-based notes explorer plus a single search box; each memory now appears exactly once under a derived path based on scope, namespace context, and note type.\nWhy: The user clarified that the Obsidian-like folder tree was meant to organize notes themselves, not filters or navigation controls.\nWhere: src/olinkb/viewer.py, tests/test_viewer.py, olinkb-viewer/index.html.\nLearned: In this UI, the left sidebar must model content structure directly; even a well-designed filter tree still feels wrong if the user's mental model expects a file explorer of notes.", "memory_type": "decision", "scope": "project", "namespace": "project://olinkb", "author_username": "GitHub Copilot", "tags": ["viewer", "ux", "sidebar", "explorer"], "metadata": {"what": "Removed the sidebar filter tree from the static viewer and replaced it with a canonical folder-based notes explorer plus a single search box; each memory now appears exactly once under a derived path based on scope, na
