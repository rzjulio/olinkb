name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install .[dev] build

      - name: Run test suite
        run: pytest

  build-and-release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributable artifacts
        run: python -m build

      - name: Resolve release notes
        id: release_notes
        run: |
          candidate="docs/releases/${GITHUB_REF_NAME}.md"
          fallback="docs/releases/TEMPLATE.md"
          output="release-notes.md"

          if [ -f "$candidate" ]; then
            cp "$candidate" "$output"
          else
            sed "s/__VERSION__/${GITHUB_REF_NAME}/g" "$fallback" > "$output"
          fi

          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            dist/*.whl
            dist/*.tar.gz
