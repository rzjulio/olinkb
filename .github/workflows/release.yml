name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build, for example 0.1.3 or v0.1.3"
        required: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "Release version is required" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Sync package versions from release tag
        run: python scripts/sync_package_versions.py "${{ steps.release_version.outputs.version }}"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install .[dev] build

      - name: Run test suite
        run: pytest

  build-and-release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "Release version is required" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Sync package versions from release tag
        run: python scripts/sync_package_versions.py "${{ steps.release_version.outputs.version }}"

      - name: Build distributable artifacts
        run: |
          python -m build
          python -m build packages/olinkb-mcp
          cp packages/olinkb-mcp/dist/* dist/

      - name: Verify base wheel stays CLI-only
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/python" -m pip install --upgrade pip
          "$tmpdir/venv/bin/python" -m pip install dist/olinkb-${{ steps.release_version.outputs.version }}-py3-none-any.whl
          if "$tmpdir/venv/bin/python" -m pip show mcp >/dev/null 2>&1; then
            echo "The base OlinKB wheel unexpectedly installed mcp" >&2
            exit 1
          fi
          "$tmpdir/venv/bin/python" -c "import importlib.metadata as md; print('Base wheel Requires-Dist:', md.metadata('olinkb').get_all('Requires-Dist') or [])"

      - name: Resolve release notes
        id: release_notes
        run: |
          tag_name="${{ steps.release_version.outputs.tag }}"
          candidate="docs/releases/${tag_name}.md"
          fallback="docs/releases/TEMPLATE.md"
          output="release-notes.md"

          if [ -f "$candidate" ]; then
            cp "$candidate" "$output"
          else
            sed "s/__VERSION__/${tag_name}/g" "$fallback" > "$output"
          fi

          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          generate_release_notes: true
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            dist/*.whl
            dist/*.tar.gz
