[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "olinkb-mcp"
version = "0.1.0"
description = "Optional MCP transport addon for the OlinKB CLI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "olinkb==0.1.0",
    "mcp>=1.27.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]